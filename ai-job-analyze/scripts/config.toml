# ai-job-analyze 的默认配置。
# 本文件可以进入 Git，只放非敏感默认值；不要放 token、cookie、密码、浏览器登录态或模型密钥。

[crawl]
default_companies = ["bytedance", "alibaba", "tencent", "meituan"]
default_channel = "social"
default_query = "AI"
max_jobs_per_task = 120
hard_max_pages_per_source = 20
request_timeout_seconds = 30

[normalize]
batch_size = 20
max_retries = 2
schema_version = "job-posting.v1"

[report]
default_format = "html"
export_png = false
theme = "editorial"
include_failed_sources = true

[output]
data_root_dir = "caffronix-agent-skills"
skill_workspace_dir = "caffronix-agent-skills/ai-job-analyze"
work_dir = "caffronix-agent-skills/ai-job-analyze/work"
reports_dir = "caffronix-agent-skills/ai-job-analyze/reports"
cache_dir = "caffronix-agent-skills/ai-job-analyze/cache"
logs_dir = "caffronix-agent-skills/ai-job-analyze/logs"
runtime_dir = "caffronix-agent-skills/ai-job-analyze/runtime"

[safety]
stop_on_login = true
stop_on_captcha = true
read_browser_state = false

[sources.bytedance.social]
entry_url = "https://jobs.bytedance.com/experienced/position"
url_template = "https://jobs.bytedance.com/experienced/position?keywords={query}&category=&location=&project=&type=&job_hot_flag=&current={page}&limit={limit}&functionCategory=&tag="
query_param = "keywords"
page_param = "current"
page_start = 1
limit_param = "limit"
default_limit = 10
pagination_mode = "query_param"

[sources.bytedance.campus]
entry_url = "https://jobs.bytedance.com/campus/position"
url_template = "https://jobs.bytedance.com/campus/position?keywords={query}&category=&location=&project=&type=&job_hot_flag=&current={page}&limit={limit}&functionCategory=&tag="
query_param = "keywords"
page_param = "current"
page_start = 1
limit_param = "limit"
default_limit = 10
pagination_mode = "query_param"

[sources.meituan.social]
entry_url = "https://zhaopin.meituan.com/web/social"
url_template = "https://zhaopin.meituan.com/web/social?keyword={query}&pageNo={page}"
query_param = "keyword"
page_param = "pageNo"
page_start = 1
api_url = "https://zhaopin.meituan.com/api/official/job/getJobList"
hiring_type = "1_1"
pagination_mode = "query_param"

[sources.meituan.campus]
entry_url = "https://zhaopin.meituan.com/web/campus"
url_template = "https://zhaopin.meituan.com/web/campus?keyword={query}&pageNo={page}"
query_param = "keyword"
page_param = "pageNo"
page_start = 1
api_url = "https://zhaopin.meituan.com/api/official/job/getJobList"
hiring_type = "2_2"
pagination_mode = "query_param"

[sources.tencent.social]
entry_url = "https://careers.tencent.com/search.html"
url_template = "https://careers.tencent.com/search.html?index={page}&keyword={query}"
query_param = "keyword"
page_param = "index"
page_start = 1
api_url = "https://careers.tencent.com/tencentcareer/api/post/Query"
pagination_mode = "query_param"

[sources.tencent.campus]
entry_url = "https://careers.tencent.com/search.html"
url_template = "https://careers.tencent.com/search.html?keyword={query}&query=at_2,at_3"
query_param = "keyword"
fixed_query = "at_2,at_3"
api_url = "https://careers.tencent.com/tencentcareer/api/post/Query"
pagination_mode = "needs_adapter_check"

[sources.alibaba.social]
entry_url = "https://talent-holding.alibaba.com/off-campus/position-list"
url_template = "https://talent-holding.alibaba.com/off-campus/position-list"
pagination_mode = "special_adapter"
notes = "社招 URL 中未暴露关键词和分页参数；实现 adapter 时需要通过浏览器观察前端请求、路由状态或接口载荷确认关键词输入和翻页机制。"

[sources.alibaba.intern]
entry_url = "https://campus-talent.alibaba.com/campus/position"
url_template = "https://campus-talent.alibaba.com/campus/position?batchId=100000540002&circleCode=60000&filterParams=%7B%22customDept%22%3A%5B%22YKCNU1%22%2C%22P1ZVE7%22%2C%22O1BGLD%22%2C%222OAHS3%22%2C%22R4NF3G%22%2C%22UXLZSO%22%5D%7D"
channel = "campus"
sub_channel = "intern"
pagination_mode = "needs_adapter_check"

[sources.alibaba.freshman]
entry_url = "https://talent-holding.alibaba.com/campus/position-list"
url_template = "https://talent-holding.alibaba.com/campus/position-list?campusType=freshman&lang=zh&batchId=100000060001"
channel = "campus"
sub_channel = "freshman"
pagination_mode = "needs_adapter_check"
